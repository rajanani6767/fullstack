<!DOCTYPE html>
<html>
<head>
<title>Student Registration</title>
<style>
body{
font-family:Arial;
background:#f2f2f2;
text-align:center;
}

form{
background:white;
padding:20px;
width:300px;
margin:auto;
margin-top:100px;
border-radius:8px;
}

input,select{
width:100%;
padding:8px;
margin:8px 0;
}

button{
background:blue;
color:white;
padding:10px;
border:none;
width:100%;
}
</style>
</head>

<body>

<form>

<h2>Student Registration</h2>

<input type="text" placeholder="Name" required>

<input type="email" placeholder="Email" required>

<input type="date" required>

<select>
<option>CSE</option>
<option>ECE</option>
<option>IT</option>
<option>MECH</option>
</select>

<input type="text" placeholder="Phone">

<button>Register</button>

</form>

</body>
</html>
